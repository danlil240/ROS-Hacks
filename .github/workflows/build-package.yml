name: Build and Release Package

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ubuntu_version: ['22.04', '24.04']
    container:
      image: ubuntu:${{ matrix.ubuntu_version }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        for i in $(seq 1 5); do apt-get update && break || sleep 5; done
        for i in $(seq 1 5); do apt-get install -y devscripts debhelper build-essential dh-make lintian lsb-release && break || sleep 5; done

    - name: Verify ROS distro detection
      shell: bash
      run: |
        source scripts/detect-ros-distro.sh
        case "${{ matrix.ubuntu_version }}" in
          22.04) test "$ROS2_NAME" = "humble" ;;
          24.04) test "$ROS2_NAME" = "jazzy" ;;
          *) echo "Unexpected Ubuntu version: ${{ matrix.ubuntu_version }}" >&2; exit 1 ;;
        esac
        echo "Detected ROS2_NAME=$ROS2_NAME on Ubuntu ${{ matrix.ubuntu_version }}"

    - name: Build package
      run: |
        dpkg-buildpackage -us -uc -b

    - name: Move deb files
      run: |
        mkdir -p artifacts
        mv ../*.deb artifacts/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: packages-ubuntu-${{ matrix.ubuntu_version }}
        path: artifacts/*.deb
        
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: packages-*
        merge-multiple: true
        path: artifacts

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/*.deb
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-apt:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger APT repository update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.ROS_HACKS_APT_DISPATCH_TOKEN }}
          repository: danlil240/ros-hacks-apt
          event-type: release-published
          client-payload: '{"source_ref": "${{ github.ref_name }}", "source_repo": "danlil240/ROS-Hacks"}'
